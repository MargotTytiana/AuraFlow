<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport: width=device-width keeps the layout pixel-perfect on mobile.
      initial-scale=1.0 prevents iOS Safari from auto-zooming on input focus.
      viewport-fit=cover extends the safe area into the notch / home indicator
      region on iPhone X and later — important for the fixed status dot position.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- ── PWA meta tags ─────────────────────────────────────────────────── -->

    <!--
      Link to the Web App Manifest served from public/manifest.json.
      Enables "Add to Home Screen" prompts on Android and desktop Chrome.
      Must be in <head> for the browser to detect it before first paint.
    -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      theme-color tints the browser address bar and status bar on Android
      to match the app's dark background, reinforcing the immersive aesthetic.
      Duplicated from manifest.json because Safari reads it from <meta> only.
    -->
    <meta name="theme-color" content="#0a0a0f" />

    <!--
      apple-mobile-web-app-capable: enables standalone mode on iOS when the
      page is saved to the home screen (equivalent to manifest display:standalone).
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuraFlow" />

    <!-- ── Favicon ───────────────────────────────────────────────────────── -->

    <!--
      SVG favicon scales perfectly at all sizes and supports dark/light mode
      via CSS media queries inside the SVG. No need for multiple PNG sizes.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Apple touch icon is used when saving to the iOS home screen.
      180x180 is the recommended size — covers all current iPhone/iPad models.
    -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Performance hints ─────────────────────────────────────────────── -->

    <!--
      Preconnect to the jsDelivr CDN that serves MediaPipe WASM and model files.
      Establishes the TCP + TLS handshake before VisionCapture.ts requests the
      first model file, reducing perceived load time after the start button click.
    -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- ── Styles ────────────────────────────────────────────────────────── -->

    <!--
      Global stylesheet imported here as well as in main.ts.
      The <link> ensures styles are applied before first paint (no FOUC).
      The import in main.ts lets Vite process and bundle it with the app chunk.
    -->
    <link rel="stylesheet" href="/src/styles.css" />

    <!-- ── Document metadata ─────────────────────────────────────────────── -->

    <title>AuraFlow</title>

    <!--
      Description is used by search engines and PWA install prompts.
      Keep it concise — shown truncated in most contexts.
    -->
    <meta
      name="description"
      content="Gesture-controlled ambient soundscape for meditation, focus, and sleep."
    />

    <!--
      Prevent search engines from indexing the app.
      AuraFlow is a tool, not content — there is nothing useful to index,
      and indexing the single-page shell provides no SEO value.
    -->
    <meta name="robots" content="noindex, nofollow" />

  </head>

  <body>

    <!--
      Hidden video element used by VisionCapture.ts as the image source
      for MediaPipe Hands inference.

      Why not create it in JS?
        Declaring it in HTML guarantees it exists in the DOM before any
        script runs, avoiding a timing race where VisionCapture.ts calls
        document.getElementById('input_video') before the element exists.

      playsinline: required on iOS to prevent the video from opening in
        fullscreen. Without it, the camera feed hijacks the viewport.

      autoplay: needed by the Camera utility from @mediapipe/camera_utils
        to start frame delivery without a separate .play() call.

      muted: required alongside autoplay — browsers block unmuted autoplay.
        The video element is never heard; it feeds frames to MediaPipe only.
    -->
    <video
      id="input_video"
      playsinline
      autoplay
      muted
    ></video>

    <!--
      Transparent canvas overlay used by DebugOverlay.ts.
      Only becomes visible when ?debug=true is in the URL.
      Declared in HTML for the same reason as the video element —
      guaranteed DOM presence before any script runs.
    -->
    <canvas id="debug-canvas"></canvas>

    <!--
      Status indicator anchor element.
      StatusIndicator.ts mounts the dot inside this element so it has
      a stable DOM parent. Using a named element rather than document.body
      makes the indicator easier to find in DevTools and avoids appending
      directly to body alongside the start button and error message.
    -->
    <div id="status-indicator" aria-hidden="true" role="presentation"></div>

    <!--
      Application entry point.
      type="module" is required for ES module imports (import / export).
      Vite replaces this path with the hashed bundle URL at build time.
      Placed at the end of <body> so the DOM elements above are parsed
      and available before any script references them by ID.
    -->
    <script type="module" src="/src/main.ts"></script>

  </body>
</html>
